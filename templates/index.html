<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
width:400px;
text-align:center;
}

h1{
margin-bottom:20px;
color:#333;
}

select,input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#4facfe;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#00c6ff;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Resume Analyzer</h1>

<form method="POST" enctype="multipart/form-data">

<label>Select Job Role</label>

<select name="role" required>

<option value="">Choose a role</option>

{% for role in roles %}
<option value="{{role}}">{{role}}</option>
{% endfor %}

</select>

<label>Upload Resume (PDF or DOCX)</label>

<input type="file" name="resume" required>

<button type="submit">Analyze Resume</button>

</form>

</div>

</body>
</html>
