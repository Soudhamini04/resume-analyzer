<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Analyzer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    background: linear-gradient(135deg, #f0f4ff, #d9e6ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .card {
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    background: #ffffff;
    width: 100%;
    max-width: 450px;
  }
  h2 {
    font-weight: 700;
    margin-bottom: 30px;
    text-align: center;
    color: #1a2b4c;
  }
  .btn-primary {
    background-color: #4a90e2;
    border: none;
    font-size: 18px;
    padding: 12px;
    border-radius: 12px;
  }
  .btn-primary:hover {
    background-color: #357ab7;
  }
  label {
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="card">
    <h2>Resume Analyzer</h2>
    <form action="/analyze" method="POST" enctype="multipart/form-data">
      <div class="mb-4">
        <label for="role" class="form-label">Select Role</label>
        <select class="form-select" id="role" name="role" required>
          <option value="" selected disabled>Choose a role</option>
          {% for role in roles %}
            <option value="{{ role }}">{{ role }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-4">
        <label for="resume" class="form-label">Upload Resume (PDF or DOCX)</label>
        <input class="form-control" type="file" id="resume" name="resume" accept=".pdf,.docx" required>
      </div>

      <div class="d-grid mt-3">
        <button type="submit" class="btn btn-primary">Analyze Resume</button>
      </div>
    </form>
  </div>
</body>
</html>
