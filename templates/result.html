<!DOCTYPE html>
<html>

<head>
<title>Analysis Result</title>
</head>

<body>

<h1>Resume Analysis Result</h1>

<h2>Selected Role: {{role}}</h2>

<h2>ATS Score: {{score}}%</h2>

<h3>Missing Skills</h3>

<ul>

{% for skill in missing %}

<li>{{skill}}</li>

{% endfor %}

</ul>

<h3>Suggestions to Improve Resume</h3>

<ul>

{% for s in suggestions %}

<li>{{s}}</li>

{% endfor %}

</ul>

<br>

<a href="/">Analyze Another Resume</a>

</body>

</html>
